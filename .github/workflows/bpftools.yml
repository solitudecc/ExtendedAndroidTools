name: Build bpftools archives

on: [push, pull_request, workflow_dispatch]

jobs:
  build_bpftools:
    name: Build bpftools archive
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo ./scripts/jammy-install-deps.sh

      - name: Setup NDK
        run: ./scripts/download-ndk.sh

      - name: Build
        run: |
          set -euo pipefail

          make bpftools \
            NDK_PATH="$(pwd)/android-ndk-r27b" \
            NDK_ARCH="${{ matrix.arch }}" \
            LLVM_SHARED=true \
            ENABLE_LLVM_SHARED=true \
            LLVM_BUILD_LLVM_DYLIB=true \
            LLVM_LINK_LLVM_DYLIB=true \
            CLANG_LINK_CLANG_DYLIB=true

      - name: Verify bpftools archive LLVM linking
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE="bpftools-${{ matrix.arch }}.tar.gz"
          WORK="$(mktemp -d)"

          tar -xzf "$ARCHIVE" -C "$WORK"

          echo "===== archive files of interest ====="
          find "$WORK" -type f \( \
            -name 'bpftrace' -o \
            -name 'libbcc.so' -o \
            -name 'libbcc.so.*' -o \
            -name 'libclang.so' -o \
            -name 'libclang.so.*' -o \
            -name 'libclang-cpp.so' -o \
            -name 'libclang-cpp.so.*' -o \
            -name 'libLLVM*.so' -o \
            -name 'libLLVM*.so.*' \
          \) -print || true

          echo
          echo "===== NEEDED entries ====="
          while IFS= read -r f; do
            file "$f" 2>/dev/null | grep -q ELF || continue

            case "$f" in
              *bpftrace|*libbcc.so|*libbcc.so.*|*libclang.so|*libclang.so.*|*libclang-cpp.so|*libclang-cpp.so.*|*libLLVM*.so|*libLLVM*.so.*)
                echo "===== $f ====="
                readelf -d "$f" 2>/dev/null | grep NEEDED || true
                ;;
            esac
          done < <(find "$WORK" -type f)

          echo
          echo "===== check libclang-cpp.so location ====="
          if ! find "$WORK" -type f -path '*/lib/libclang-cpp.so*' | grep -q .; then
            echo "ERROR: libclang-cpp.so not found under lib/"
            echo "Do not fix this by copying random libclang-cpp.so after build."
            echo "Fix the build so clang/LLVM shared libs are produced correctly."
            exit 1
          fi

          echo
          echo "===== check duplicate LLVM BPF option marker ====="
          COUNT=0

          while IFS= read -r f; do
            file "$f" 2>/dev/null | grep -q ELF || continue

            if strings "$f" 2>/dev/null | grep -q 'disable-bpf-peephole'; then
              echo "FOUND in $f"
              COUNT=$((COUNT + 1))
            fi
          done < <(find "$WORK" -type f)

          if [ "$COUNT" -gt 1 ]; then
            echo
            echo "ERROR: LLVM appears to be embedded in multiple ELF files."
            echo "This will cause Android runtime crash:"
            echo "  Option 'disable-bpf-peephole' registered more than once"
            echo
            echo "Fix build flags so bpftrace/bcc/clang share one libLLVM.so."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bpftools-android-${{ matrix.arch }}.tar.gz
          path: bpftools-${{ matrix.arch }}.tar.gz

  build_bpftools_min:
    name: Build bpftools-min archive
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo ./scripts/jammy-install-deps.sh

      - name: Setup NDK
        run: ./scripts/download-ndk.sh

      - name: Build
        run: |
          set -euo pipefail

          make bpftools-min \
            NDK_PATH="$(pwd)/android-ndk-r27b" \
            NDK_ARCH="${{ matrix.arch }}" \
            LLVM_SHARED=true \
            ENABLE_LLVM_SHARED=true \
            LLVM_BUILD_LLVM_DYLIB=true \
            LLVM_LINK_LLVM_DYLIB=true \
            CLANG_LINK_CLANG_DYLIB=true

      - name: Verify bpftools-min archive LLVM linking
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE="bpftools-min-${{ matrix.arch }}.tar.gz"
          WORK="$(mktemp -d)"

          tar -xzf "$ARCHIVE" -C "$WORK"

          echo "===== archive files of interest ====="
          find "$WORK" -type f \( \
            -name 'bpftrace' -o \
            -name 'libbcc.so' -o \
            -name 'libbcc.so.*' -o \
            -name 'libclang.so' -o \
            -name 'libclang.so.*' -o \
            -name 'libclang-cpp.so' -o \
            -name 'libclang-cpp.so.*' -o \
            -name 'libLLVM*.so' -o \
            -name 'libLLVM*.so.*' \
          \) -print || true

          echo
          echo "===== NEEDED entries ====="
          while IFS= read -r f; do
            file "$f" 2>/dev/null | grep -q ELF || continue

            case "$f" in
              *bpftrace|*libbcc.so|*libbcc.so.*|*libclang.so|*libclang.so.*|*libclang-cpp.so|*libclang-cpp.so.*|*libLLVM*.so|*libLLVM*.so.*)
                echo "===== $f ====="
                readelf -d "$f" 2>/dev/null | grep NEEDED || true
                ;;
            esac
          done < <(find "$WORK" -type f)

          echo
          echo "===== check libclang-cpp.so location ====="
          if ! find "$WORK" -type f -path '*/lib/libclang-cpp.so*' | grep -q .; then
            echo "ERROR: libclang-cpp.so not found under lib/"
            echo "Do not fix this by copying random libclang-cpp.so after build."
            echo "Fix the build so clang/LLVM shared libs are produced correctly."
            exit 1
          fi

          echo
          echo "===== check duplicate LLVM BPF option marker ====="
          COUNT=0

          while IFS= read -r f; do
            file "$f" 2>/dev/null | grep -q ELF || continue

            if strings "$f" 2>/dev/null | grep -q 'disable-bpf-peephole'; then
              echo "FOUND in $f"
              COUNT=$((COUNT + 1))
            fi
          done < <(find "$WORK" -type f)

          if [ "$COUNT" -gt 1 ]; then
            echo
            echo "ERROR: LLVM appears to be embedded in multiple ELF files."
            echo "This will cause Android runtime crash:"
            echo "  Option 'disable-bpf-peephole' registered more than once"
            echo
            echo "Fix build flags so bpftrace/bcc/clang share one libLLVM.so."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bpftools-min-android-${{ matrix.arch }}.tar.gz
          path: bpftools-min-${{ matrix.arch }}.tar.gz

  build_bpftrace_static:
    name: Build static bpftrace binaries
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [arm64, x86_64, armv7]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo ./scripts/jammy-install-deps.sh

      - name: Setup NDK
        run: ./scripts/download-ndk.sh

      - name: Build
        run: |
          set -euo pipefail

          make bpftrace \
            NDK_PATH="$(pwd)/android-ndk-r27b" \
            NDK_ARCH="${{ matrix.arch }}" \
            STATIC_LINKING=true \
            LLVM_BPF_ONLY=true

      - name: Verify static bpftrace binary
        shell: bash
        run: |
          set -euo pipefail

          BIN="out/android/${{ matrix.arch }}/bin/bpftrace"

          echo "===== file ====="
          file "$BIN"

          echo
          echo "===== dynamic deps, if any ====="
          readelf -d "$BIN" 2>/dev/null | grep NEEDED || true

          echo
          echo "===== LLVM BPF marker ====="
          if strings "$BIN" 2>/dev/null | grep -q 'disable-bpf-peephole'; then
            echo "FOUND in $BIN"
          else
            echo "not found"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bpftrace-android-${{ matrix.arch }}
          path: out/android/${{ matrix.arch }}/bin/bpftrace
