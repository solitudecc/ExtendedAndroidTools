name: Build bpftools archives

on: [push, pull_request, workflow_dispatch]

jobs:
  build_bpftools:
    name: Build bpftools archive
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        env:
          - ARCH: arm64
          - ARCH: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo ./scripts/jammy-install-deps.sh

      - name: Setup NDK
        run: ./scripts/download-ndk.sh

      - name: Build
        env: ${{ matrix.env }}
        run: make bpftools NDK_PATH=`pwd`/android-ndk-r27b NDK_ARCH=${{ matrix.env['ARCH'] }}

      - name: Bundle missing libclang-cpp.so into bpftools archive
        env: ${{ matrix.env }}
        run: |
          set -euo pipefail

          ARCHIVE="bpftools-${{ matrix.env['ARCH'] }}.tar.gz"
          WORK="$(mktemp -d)"

          tar -xzf "$ARCHIVE" -C "$WORK"

          LIBDIR="$(find "$WORK" -type d -name lib | head -1)"
          test -n "$LIBDIR" || { echo "lib directory not found in archive"; exit 1; }

          if ! find "$LIBDIR" -maxdepth 1 -name 'libclang-cpp.so*' | grep -q .; then
            SRC="$(find "$PWD" out android-ndk-r27b -name 'libclang-cpp.so*' 2>/dev/null | head -1)"
            test -n "$SRC" || { echo "libclang-cpp.so not found in build tree"; exit 1; }

            echo "bundling $SRC -> $LIBDIR/"
            cp -av "$SRC" "$LIBDIR/"

            if [ ! -e "$LIBDIR/libclang-cpp.so" ]; then
              ln -s "$(basename "$SRC")" "$LIBDIR/libclang-cpp.so" || cp -av "$SRC" "$LIBDIR/libclang-cpp.so"
            fi
          fi

          tar -czf "$ARCHIVE" -C "$WORK" .

      - name: Verify bpftools archive has clang libs
        env: ${{ matrix.env }}
        run: |
          set -euo pipefail

          ARCHIVE="bpftools-${{ matrix.env['ARCH'] }}.tar.gz"

          echo "checking libclang.so..."
          tar -tzf "$ARCHIVE" | grep -E '(^|/)libclang\.so(\.|$)'

          echo "checking libclang-cpp.so..."
          tar -tzf "$ARCHIVE" | grep -E '(^|/)libclang-cpp\.so(\.|$)'

      - uses: actions/upload-artifact@v4
        with:
          name: bpftools-android-${{ matrix.env['ARCH'] }}.tar.gz
          path: bpftools-${{ matrix.env['ARCH'] }}.tar.gz

  build_bpftools_min:
    name: Build bpftools-min archive
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        env:
          - ARCH: arm64
          - ARCH: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo ./scripts/jammy-install-deps.sh

      - name: Setup NDK
        run: ./scripts/download-ndk.sh

      - name: Build
        env: ${{ matrix.env }}
        run: make bpftools-min NDK_PATH=`pwd`/android-ndk-r27b NDK_ARCH=${{ matrix.env['ARCH'] }}

      - name: Bundle missing libclang-cpp.so into bpftools-min archive
        env: ${{ matrix.env }}
        run: |
          set -euo pipefail

          ARCHIVE="bpftools-min-${{ matrix.env['ARCH'] }}.tar.gz"
          WORK="$(mktemp -d)"

          tar -xzf "$ARCHIVE" -C "$WORK"

          LIBDIR="$(find "$WORK" -type d -name lib | head -1)"
          test -n "$LIBDIR" || { echo "lib directory not found in archive"; exit 1; }

          if ! find "$LIBDIR" -maxdepth 1 -name 'libclang-cpp.so*' | grep -q .; then
            SRC="$(find "$PWD" out android-ndk-r27b -name 'libclang-cpp.so*' 2>/dev/null | head -1)"
            test -n "$SRC" || { echo "libclang-cpp.so not found in build tree"; exit 1; }

            echo "bundling $SRC -> $LIBDIR/"
            cp -av "$SRC" "$LIBDIR/"

            if [ ! -e "$LIBDIR/libclang-cpp.so" ]; then
              ln -s "$(basename "$SRC")" "$LIBDIR/libclang-cpp.so" || cp -av "$SRC" "$LIBDIR/libclang-cpp.so"
            fi
          fi

          tar -czf "$ARCHIVE" -C "$WORK" .

      - name: Verify bpftools-min archive has clang libs
        env: ${{ matrix.env }}
        run: |
          set -euo pipefail

          ARCHIVE="bpftools-min-${{ matrix.env['ARCH'] }}.tar.gz"

          echo "checking libclang.so..."
          tar -tzf "$ARCHIVE" | grep -E '(^|/)libclang\.so(\.|$)'

          echo "checking libclang-cpp.so..."
          tar -tzf "$ARCHIVE" | grep -E '(^|/)libclang-cpp\.so(\.|$)'

      - uses: actions/upload-artifact@v4
        with:
          name: bpftools-min-android-${{ matrix.env['ARCH'] }}.tar.gz
          path: bpftools-min-${{ matrix.env['ARCH'] }}.tar.gz

  build_bpftrace_static:
    name: Build static bpftrace binaries
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        env:
          - ARCH: arm64
          - ARCH: x86_64
          - ARCH: armv7
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo ./scripts/jammy-install-deps.sh

      - name: Setup NDK
        run: ./scripts/download-ndk.sh

      - name: Build
        env: ${{ matrix.env }}
        run: make bpftrace NDK_PATH=`pwd`/android-ndk-r27b NDK_ARCH=${{ matrix.env['ARCH'] }} STATIC_LINKING=true LLVM_BPF_ONLY=true

      - uses: actions/upload-artifact@v4
        with:
          name: bpftrace-android-${{ matrix.env['ARCH'] }}
          path: out/android/${{ matrix.env['ARCH'] }}/bin/bpftrace
